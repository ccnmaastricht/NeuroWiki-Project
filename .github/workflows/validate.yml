name: Validate NeuroWiki Submission

on:
  pull_request:
    paths:
      - 'submissions/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Structural validation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Detect submitted wiki path
        id: detect
        run: |
          # Find the submissions/<LabName> directory changed in this PR
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '^submissions/' | head -1)
          LAB_PATH=$(echo "$CHANGED" | cut -d/ -f1-2)
          echo "lab_path=$LAB_PATH" >> $GITHUB_OUTPUT
          echo "Detected submission: $LAB_PATH"

      - name: Run merge.py validation
        run: |
          python3 merge.py \
            --source ${{ steps.detect.outputs.lab_path }} \
            --target wiki/ \
            --report validation-report.json \
            --lab "${{ steps.detect.outputs.lab_path }}"

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-report
          path: validation-report.json

      - name: Check log present and signed
        run: |
          LOG="${{ steps.detect.outputs.lab_path }}/log.md"
          if [ ! -f "$LOG" ]; then
            echo "ERROR: log.md not found in submission"
            exit 1
          fi
          if ! grep -q "✓ Verified" "$LOG"; then
            echo "ERROR: log.md contains no verified session entry (missing '✓ Verified')"
            exit 1
          fi
          echo "log.md: OK"

      - name: Check no MISSING stubs in frontmatter
        run: |
          MISSING=$(grep -rl "<!-- MISSING -->" ${{ steps.detect.outputs.lab_path }}/pages/ 2>/dev/null || true)
          if [ -n "$MISSING" ]; then
            echo "ERROR: Pages with incomplete frontmatter (<!-- MISSING --> fields):"
            echo "$MISSING"
            exit 1
          fi
          echo "Frontmatter completeness: OK"

      - name: Check no deprecated PAP_ citations
        run: |
          PAP=$(grep -rl "\[\[PAP_" ${{ steps.detect.outputs.lab_path }}/pages/ 2>/dev/null || true)
          if [ -n "$PAP" ]; then
            echo "ERROR: Deprecated PAP_ citation prefix found in:"
            echo "$PAP"
            exit 1
          fi
          echo "Citation prefix check: OK"

      - name: Summary
        if: success()
        run: echo "All checks passed. Submission is ready for human review."
